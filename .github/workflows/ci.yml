name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test:
    runs-on: ubuntu-26.04

    steps:
      - uses: actions/checkout@v7
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y clang-format libevdev-dev libdbus-1-dev
      - name: Format check
        run: |
          clang-format --version
          make fmt
          git diff --exit-code
      - name: Build
        run: make
      - name: Test
        run: make test >> $GITHUB_STEP_SUMMARY
