name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install clang-format libevdev-dev libdbus-1-dev
      - name: Format check
        run: |
          make fmt
          git diff --exit-code
      - name: Build
        run: make
      - name: Test
        run: make test
